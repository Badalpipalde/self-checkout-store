services:
  - type: web
    name: self-checkout-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        fromSecret: mongodb_uri
      - key: JWT_SECRET
        fromSecret: jwt_secret
      - key: JWT_EXPIRE
        value: 7d
      - key: QR_ENCRYPTION_KEY
        value: ScanCart-32CharEncryptionKey2025
      - key: RAZORPAY_KEY_ID
        fromSecret: razorpay_key_id
      - key: RAZORPAY_KEY_SECRET
        fromSecret: razorpay_key_secret
      - key: CLOUDINARY_CLOUD_NAME
        fromSecret: cloudinary_name
      - key: CLOUDINARY_API_KEY
        fromSecret: cloudinary_key
      - key: CLOUDINARY_API_SECRET
        fromSecret: cloudinary_secret
      - key: CLIENT_URL
        value: https://<your-render-service>.onrender.com
